<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0b0f19;
        color: #e6e9f2;
      }
      .kopf {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }
      .logo {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
      }
      .titel {
        font-weight: 700;
        font-size: 16px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #9ca3af;
        margin: 12px 0 4px 0;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        background: #161c2d;
        color: #e6e9f2;
        border: 1px solid #2a3350;
        border-radius: 8px;
        padding: 8px;
        font-size: 13px;
      }
      .reihe {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
        font-size: 13px;
      }
      button {
        margin-top: 14px;
        width: 100%;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 9px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
      }
      .status {
        margin-top: 12px;
        font-size: 12px;
        color: #9ca3af;
        min-height: 16px;
      }
      .status.ok {
        color: #34d399;
      }
      .status.fehler {
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <div class="kopf">
      <div class="logo">💬</div>
      <div class="titel">Kudora</div>
    </div>

    <label for="url">Backend-Adresse</label>
    <input id="url" type="text" placeholder="http://localhost:8000" />

    <div class="reihe">
      <input id="enabled" type="checkbox" checked />
      <label for="enabled" style="margin: 0">Auf Google-Seiten aktiv</label>
    </div>

    <button id="speichern">Speichern &amp; prüfen</button>
    <div id="status" class="status"></div>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
