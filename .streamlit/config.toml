# Premium-SaaS-Theme: tiefes Dunkelblau + Indigo-Akzent (Linear/Vercel-Anmutung).
[theme]
base = "dark"
primaryColor = "#6366F1"             # Indigo für Buttons, Slider, Akzente
backgroundColor = "#0B0F19"          # tiefer, hochwertiger Hintergrund
secondaryBackgroundColor = "#161C2D" # Karten & Eingaben, hebt sich klar ab
textColor = "#E6E9F2"
font = "sans serif"

[server]
headless = true
